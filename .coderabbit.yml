language: en-US
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  review_status: true
  collapse_walkthrough: true
  changed_files_summary: true
  sequence_diagrams: false
  estimate_code_review_effort: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  suggested_labels: true
  auto_apply_labels: false
  suggested_reviewers: true
  auto_assign_reviewers: false
  in_progress_fortune: true
  poem: true
  labeling_instructions: []
  path_filters:
    - "!**/node_modules/**"
    - "!**/.next/**"
    - "!**/_generated/**"
    - "!**/.turbo/**"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/coverage/**"
    - "!**/bun.lock"
    - "!**/bun.lockb"
  path_instructions:
    - path: "**/*.ts"
      instructions: |
        TypeScript strict mode. Never use `any`; use `unknown` with type guards.
        Run `bun run typecheck` before opening a PR. New modules must have explicit return types.
    - path: "**/*.tsx"
      instructions: |
        React 19 + Next.js App Router. Compose, do not edit `packages/ui/src/components/ui/*` directly.
        All interactive elements must have a visible focus ring and `cursor-pointer`.
        RTL: use logical CSS properties (`ms-*`, `me-*`, `ps-*`, `pe-*`).
    - path: "packages/convex/**"
      instructions: |
        Convex backend. All mutations require `requireAdmin` or `requireSuperAdmin`.
        Product variants are EMBEDDED as `colorVariants[]` — never split into a separate table.
        After any schema change, run `bunx convex codegen` and commit `_generated/*`.
    - path: "apps/admin/**"
      instructions: |
        Admin app. Routes under `app/(routes)/*` are admin-only; do not bypass `middleware.ts`/`proxy.ts` auth guard.
        Money is formatted with `formatMMK()`; user-facing strings use `t('admin.*')`.
    - path: "apps/storefront/**"
      instructions: |
        Storefront app. Public routes. Guest checkout is allowed; do not require auth.
        Use the shared `DataTable` from `packages/ui` for any tabular data.
  abort_on_close: true
  disable_cache: false
  auto_review:
    enabled: true
    auto_incremental_review: true
    ignore_title_keywords: []
    labels: []
    drafts: false
    base_branches:
      - main
      - develop
chat:
  auto_reply: true
knowledge_base:
  opt_out: false
  learnings:
    scope: local
  issues:
    scope: local
  pull_requests:
    scope: local
code_generation:
  docstrings:
    language: en-US
    path_instructions: []
issue_enrichment:
  planning: false
experimental:
  enable_bito: false
  enable_mcp: false
  generate_ask_seer: false
  turn_off_github_status: false
  use_github_checks_for_status: false
flag_settings:
  base_branches:
    - main
    - develop
finishing_touches:
  docstrings:
    enabled: true
