name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Convex types
        run: bun run --filter '@workspace/convex' codegen

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Format check
        run: bun run format:check
