name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        env:
          # Placeholders for build-time module import. The auth handler module
          # asserts these at import; actual auth calls are never made during
          # the build. Real values are injected by Vercel at deploy time.
          NEXT_PUBLIC_CONVEX_URL: https://ci-placeholder.convex.cloud
          NEXT_PUBLIC_CONVEX_SITE_URL: https://ci-placeholder.convex.site
        run: bun run build

      - name: Format check
        run: bun run format:check

  # Source map upload + Sentry release is created automatically by
  # Sentry.withSentryConfig during the `build` job above when
  # SENTRY_AUTH_TOKEN / SENTRY_ORG / SENTRY_PROJECT are set in the GitHub
  # Actions secrets. This job creates a named Sentry release and links it
  # to the git commit so stack traces are grouped by release on the Sentry
  # dashboard. Runs on main pushes only; PRs do not get releases to avoid
  # polluting the issue stream.
  sentry-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Create Sentry release
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          set -euo pipefail
          npx --yes @sentry/cli@latest releases new "$GITHUB_SHA"
          npx --yes @sentry/cli@latest releases set-commits "$GITHUB_SHA" --auto
          npx --yes @sentry/cli@latest releases finalize "$GITHUB_SHA"
